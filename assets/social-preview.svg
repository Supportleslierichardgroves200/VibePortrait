<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0a0f0d"/>
      <stop offset="50%" stop-color="#0c1210"/>
      <stop offset="100%" stop-color="#0f1512"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="600" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#5eead4"/>
      <stop offset="50%" stop-color="#fcd34d"/>
      <stop offset="100%" stop-color="#5eead4"/>
    </linearGradient>
    <linearGradient id="accentTeal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#0d9488"/>
    </linearGradient>
    <linearGradient id="accentAmber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="40" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="10" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Glow blobs -->
  <ellipse cx="300" cy="300" rx="300" ry="250" fill="#14b8a6" opacity="0.04" filter="url(#glow)"/>
  <ellipse cx="900" cy="350" rx="250" ry="200" fill="#f59e0b" opacity="0.03" filter="url(#glow)"/>

  <!-- Subtle grid -->
  <g opacity="0.02" stroke="#14b8a6" stroke-width="0.5">
    <line x1="0" y1="126" x2="1200" y2="126"/>
    <line x1="0" y1="252" x2="1200" y2="252"/>
    <line x1="0" y1="378" x2="1200" y2="378"/>
    <line x1="0" y1="504" x2="1200" y2="504"/>
    <line x1="240" y1="0" x2="240" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/>
    <line x1="960" y1="0" x2="960" y2="630"/>
  </g>

  <!-- ====== LEFT SIDE ====== -->

  <!-- Emoji -->
  <text x="80" y="200" font-family="system-ui, sans-serif" font-size="72">🎭</text>

  <!-- Title -->
  <text x="80" y="285" font-family="system-ui, -apple-system, sans-serif" font-size="64" font-weight="800" fill="url(#titleGrad)">VibePortrait</text>

  <!-- Tagline -->
  <text x="83" y="330" font-family="system-ui, sans-serif" font-size="22" fill="#94a3b8">Know yourself as a developer.</text>

  <!-- Value prop -->
  <text x="83" y="385" font-family="system-ui, sans-serif" font-size="16" fill="#64748b">One command → AI analyzes your coding history →</text>
  <text x="83" y="410" font-family="system-ui, sans-serif" font-size="16" fill="#64748b">beautiful portrait + persona skill</text>

  <!-- Feature pills -->
  <g font-family="system-ui, sans-serif" font-size="13" font-weight="600">
    <rect x="80" y="440" width="70" height="30" rx="15" fill="#14b8a6" opacity="0.15"/>
    <rect x="80" y="440" width="70" height="30" rx="15" stroke="#14b8a6" stroke-width="1" fill="none" opacity="0.35"/>
    <text x="93" y="460" fill="#5eead4">MBTI</text>

    <rect x="160" y="440" width="80" height="30" rx="15" fill="#f59e0b" opacity="0.15"/>
    <rect x="160" y="440" width="80" height="30" rx="15" stroke="#f59e0b" stroke-width="1" fill="none" opacity="0.35"/>
    <text x="175" y="460" fill="#fcd34d">Rating</text>

    <rect x="250" y="440" width="120" height="30" rx="15" fill="#0d9488" opacity="0.15"/>
    <rect x="250" y="440" width="120" height="30" rx="15" stroke="#0d9488" stroke-width="1" fill="none" opacity="0.35"/>
    <text x="265" y="460" fill="#2dd4bf">Famous 3D</text>

    <rect x="380" y="440" width="95" height="30" rx="15" fill="#10b981" opacity="0.15"/>
    <rect x="380" y="440" width="95" height="30" rx="15" stroke="#10b981" stroke-width="1" fill="none" opacity="0.35"/>
    <text x="393" y="460" fill="#6ee7b7">Persona</text>
  </g>

  <!-- Install hint -->
  <rect x="80" y="500" width="340" height="38" rx="10" fill="#111a17" stroke="#1e3a32" stroke-width="1"/>
  <text x="100" y="525" font-family="'SF Mono', 'Fira Code', monospace" font-size="14" fill="#94a3b8">
    <tspan fill="#4a6358">$</tspan> /vibe-portrait
  </text>

  <!-- Bottom attribution -->
  <text x="80" y="600" font-family="system-ui, sans-serif" font-size="13" fill="#475569">github.com/dadwadw233/VibePortrait</text>

  <!-- ====== RIGHT SIDE: Mini preview cards ====== -->

  <!-- Card: MBTI -->
  <g transform="translate(580, 80)" filter="url(#cardShadow)">
    <rect width="260" height="110" rx="14" fill="#101816" opacity="0.95"/>
    <rect width="260" height="110" rx="14" stroke="#14b8a6" stroke-width="0.5" fill="none" opacity="0.3"/>
    <text x="18" y="28" font-family="system-ui, sans-serif" font-size="10" fill="#64748b" letter-spacing="1">PERSONALITY TYPE</text>
    <text x="18" y="68" font-family="system-ui, sans-serif" font-size="42" font-weight="800" fill="#5eead4">ENTP</text>
    <rect x="18" y="82" width="220" height="5" rx="2.5" fill="#1a2e28"/>
    <rect x="18" y="82" width="132" height="5" rx="2.5" fill="url(#accentTeal)" opacity="0.7"/>
    <rect x="18" y="93" width="220" height="5" rx="2.5" fill="#1a2e28"/>
    <rect x="18" y="93" width="176" height="5" rx="2.5" fill="url(#accentTeal)" opacity="0.7"/>
  </g>

  <!-- Card: Rating -->
  <g transform="translate(860, 80)" filter="url(#cardShadow)">
    <rect width="260" height="110" rx="14" fill="#101816" opacity="0.95"/>
    <rect width="260" height="110" rx="14" stroke="#f59e0b" stroke-width="0.5" fill="none" opacity="0.3"/>
    <text x="18" y="28" font-family="system-ui, sans-serif" font-size="10" fill="#64748b" letter-spacing="1">DEVELOPER RATING</text>
    <text x="18" y="62" font-family="system-ui, sans-serif" font-size="28" font-weight="800" fill="#fcd34d">💎 Elite</text>
    <g transform="translate(18, 78)">
      <rect x="0" y="0" width="34" height="6" rx="3" fill="url(#accentAmber)" opacity="0.8"/>
      <rect x="38" y="0" width="34" height="6" rx="3" fill="url(#accentAmber)" opacity="0.8"/>
      <rect x="76" y="0" width="34" height="6" rx="3" fill="url(#accentAmber)" opacity="0.8"/>
      <rect x="114" y="0" width="34" height="6" rx="3" fill="url(#accentAmber)" opacity="0.8"/>
      <rect x="152" y="0" width="34" height="6" rx="3" fill="url(#accentAmber)" opacity="0.8"/>
      <rect x="190" y="0" width="34" height="6" rx="3" fill="#1a2e28" opacity="0.5"/>
    </g>
    <text x="18" y="100" font-family="system-ui, sans-serif" font-size="10" fill="#64748b">夯爆了 → 夯 → 人上人 → NPC → 拉 → 拉完了</text>
  </g>

  <!-- Card: Radar -->
  <g transform="translate(580, 210)" filter="url(#cardShadow)">
    <rect width="260" height="190" rx="14" fill="#101816" opacity="0.95"/>
    <rect width="260" height="190" rx="14" stroke="#14b8a6" stroke-width="0.5" fill="none" opacity="0.3"/>
    <text x="18" y="28" font-family="system-ui, sans-serif" font-size="10" fill="#64748b" letter-spacing="1">CAPABILITY RADAR</text>
    <g transform="translate(130, 118)">
      <polygon points="0,-60 52,-30 52,30 0,60 -52,30 -52,-30" fill="none" stroke="#1a2e28" stroke-width="1"/>
      <polygon points="0,-40 35,-20 35,20 0,40 -35,20 -35,-20" fill="none" stroke="#1a2e28" stroke-width="0.7"/>
      <polygon points="0,-52 46,-18 36,26 -6,48 -48,22 -42,-24" fill="#14b8a6" opacity="0.15" stroke="#14b8a6" stroke-width="1.5"/>
      <circle cx="0" cy="-52" r="3" fill="#14b8a6"/>
      <circle cx="46" cy="-18" r="3" fill="#14b8a6"/>
      <circle cx="36" cy="26" r="3" fill="#14b8a6"/>
      <circle cx="-6" cy="48" r="3" fill="#14b8a6"/>
      <circle cx="-48" cy="22" r="3" fill="#14b8a6"/>
      <circle cx="-42" cy="-24" r="3" fill="#14b8a6"/>
    </g>
  </g>

  <!-- Card: Famous Match 3D -->
  <g transform="translate(860, 210)" filter="url(#cardShadow)">
    <rect width="260" height="190" rx="14" fill="#101816" opacity="0.95"/>
    <rect width="260" height="190" rx="14" stroke="#10b981" stroke-width="0.5" fill="none" opacity="0.3"/>
    <text x="18" y="28" font-family="system-ui, sans-serif" font-size="10" fill="#64748b" letter-spacing="1">FAMOUS MATCH — 3 DIMENSIONS</text>

    <rect x="18" y="42" width="224" height="40" rx="8" fill="#0a1210" opacity="0.8"/>
    <text x="28" y="56" font-family="system-ui, sans-serif" font-size="9" fill="#fcd34d">TECHNICAL SPIRIT</text>
    <text x="28" y="72" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#e2e8f0">🚀 Fabrice Bellard</text>

    <rect x="18" y="90" width="224" height="40" rx="8" fill="#0a1210" opacity="0.8"/>
    <text x="28" y="104" font-family="system-ui, sans-serif" font-size="9" fill="#6ee7b7">STRATEGIC MIND</text>
    <text x="28" y="120" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#e2e8f0">🪶 诸葛亮</text>

    <rect x="18" y="138" width="224" height="40" rx="8" fill="#0a1210" opacity="0.8"/>
    <text x="28" y="152" font-family="system-ui, sans-serif" font-size="9" fill="#5eead4">COMMUNICATION SOUL</text>
    <text x="28" y="168" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#e2e8f0">🐧 Linus Torvalds</text>
  </g>

  <!-- Card: Persona -->
  <g transform="translate(580, 420)" filter="url(#cardShadow)">
    <rect width="540" height="80" rx="14" fill="#101816" opacity="0.95"/>
    <rect width="540" height="80" rx="14" stroke="#0d9488" stroke-width="0.5" fill="none" opacity="0.3"/>
    <text x="18" y="28" font-family="system-ui, sans-serif" font-size="10" fill="#64748b" letter-spacing="1">PERSONA SKILL — LET AI THINK LIKE YOU</text>
    <text x="18" y="52" font-family="'SF Mono', 'Fira Code', monospace" font-size="13" fill="#6ee7b7">"think like me"</text>
    <text x="200" y="52" font-family="'SF Mono', 'Fira Code', monospace" font-size="13" fill="#6ee7b7">"像诸葛亮一样设计方案"</text>
    <text x="18" y="70" font-family="system-ui, sans-serif" font-size="11" fill="#475569">Install anyone's persona from GitHub → AI adopts their perspective</text>
  </g>

  <!-- Card: Work Rhythm mini -->
  <g transform="translate(580, 520)" filter="url(#cardShadow)">
    <rect width="540" height="65" rx="14" fill="#101816" opacity="0.95"/>
    <rect width="540" height="65" rx="14" stroke="#14b8a6" stroke-width="0.5" fill="none" opacity="0.3"/>
    <text x="18" y="25" font-family="system-ui, sans-serif" font-size="10" fill="#64748b" letter-spacing="1">WORK RHYTHM · COMMUNICATION · TECH MAP</text>
    <!-- Mini heatmap -->
    <g transform="translate(18, 36)">
      <rect x="0" y="0" width="18" height="18" rx="3" fill="#14b8a6" opacity="0.05"/>
      <rect x="22" y="0" width="18" height="18" rx="3" fill="#14b8a6" opacity="0.08"/>
      <rect x="44" y="0" width="18" height="18" rx="3" fill="#14b8a6" opacity="0.15"/>
      <rect x="66" y="0" width="18" height="18" rx="3" fill="#14b8a6" opacity="0.3"/>
      <rect x="88" y="0" width="18" height="18" rx="3" fill="#14b8a6" opacity="0.6"/>
      <rect x="110" y="0" width="18" height="18" rx="3" fill="#14b8a6" opacity="0.85"/>
      <rect x="132" y="0" width="18" height="18" rx="3" fill="#14b8a6" opacity="0.9"/>
      <rect x="154" y="0" width="18" height="18" rx="3" fill="#14b8a6" opacity="0.7"/>
      <rect x="176" y="0" width="18" height="18" rx="3" fill="#14b8a6" opacity="0.5"/>
      <rect x="198" y="0" width="18" height="18" rx="3" fill="#14b8a6" opacity="0.3"/>
      <rect x="220" y="0" width="18" height="18" rx="3" fill="#14b8a6" opacity="0.15"/>
      <rect x="242" y="0" width="18" height="18" rx="3" fill="#14b8a6" opacity="0.05"/>
    </g>
    <!-- Mini donut placeholder -->
    <circle cx="340" cy="42" r="12" fill="none" stroke="#1a2e28" stroke-width="4"/>
    <circle cx="340" cy="42" r="12" fill="none" stroke="#14b8a6" stroke-width="4" stroke-dasharray="48 75" transform="rotate(-90 340 42)"/>
    <circle cx="340" cy="42" r="12" fill="none" stroke="#f59e0b" stroke-width="4" stroke-dasharray="20 75" stroke-dashoffset="-48" transform="rotate(-90 340 42)"/>
    <text x="370" y="40" font-family="system-ui, sans-serif" font-size="10" fill="#5eead4">97% 中文</text>
    <text x="370" y="54" font-family="system-ui, sans-serif" font-size="10" fill="#fcd34d">3% English</text>
    <!-- Tool badges -->
    <text x="450" y="46" font-family="system-ui, sans-serif" font-size="10" fill="#94a3b8">PyTorch · Docker · Git · CUDA</text>
  </g>
</svg>
